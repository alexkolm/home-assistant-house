# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

openhasp: !include openhasp.yaml

group:
  family:
    name: Owners
    entities:
      - device_tracker.alex
      - device_tracker.tanya

camera:
  - platform: ffmpeg
    name: domofon_audio
    input: !secret domofon_rtsp_url

shell_command:
  record_domofon_video: !secret domofon_record_cmd
  delete_domofon_video: rm -f /config/www/domofon.mp4

rest_command:
  domofon_open_door:
    url: !secret domofon_url
    method: PUT
    username: !secret domofon_user
    password: !secret domofon_password
    authentication: digest
    headers:
      Content-Type: application/xml
    payload: '<RemoteControlDoor><cmd>open</cmd></RemoteControlDoor>'
    
  domofon_reject_call:
    url: !secret domofon_callsignal_json_url
    method: PUT
    username: !secret domofon_user
    password: !secret domofon_password
    authentication: digest
    headers:
      Content-Type: application/json
    payload: '{"CallSignal":{"cmdType":"reject"}}'

input_boolean:
  notify_door:
    name: Уведомления от входной двери
    icon: mdi:door
  notify_away_home:
    name: Уехали надолго
    icon: mdi:airplane-takeoff 
  notify_offline:
    name: Уведомления об обрыве связи
    icon: mdi:ethernet-cable-off    
  notify_boiler:
    name: Запуск отопления по температуре
    icon: mdi:home-thermometer
  notify_count:
    name: Показания счетчиков переданы
    icon: mdi:counter
  test_gate_open:
    name: Тестовая кнопка замка
    icon: mdi:lock-open-variant
  heating_relay_virtual:
    name: Реле отопления
    icon: mdi:fire
  climate_daily:
    name: Режимы термостата по графику
    icon: mdi:timer-refresh
  bedroom_presence_state:
    name: Присутствие в спальне
    icon: mdi:bed    

input_number:
  boiler_starts_last_hour:
    name: Boiler starts last hour
    min: 0
    max: 100
    step: 1
  boiler_starts_previous_hour:
    name: Такты горелки за предыдущий час
    min: 0
    max: 100
    step: 1
  pressure_offset_mmhg:
    name: Pressure Offset (mmHg)
    min: -20
    max: 20
    step: 0.1
    unit_of_measurement: "mmHg"
    mode: box
    
timer:
  bedroom_presence_off_delay:
    duration: "00:15:00"

template:
  - switch:
      - name: domofon_door_rest
        unique_id: domofon_door_rest
        icon: mdi:gate-open
        state: "{{ false }}"
        turn_on:
          - service: rest_command.domofon_open_door

      - name: "Virtual Heating Relay"
        unique_id: virtual_heating_relay
        icon: mdi:fire
        state: "{{ is_state('input_boolean.heating_relay_virtual', 'on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.heating_relay_virtual
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.heating_relay_virtual
              
  - binary_sensor:
      - name: Bedroom Presence Virtual
        unique_id: bedroom_presence_virtual
        device_class: occupancy
        state: "{{ is_state('input_boolean.bedroom_presence_state', 'on') }}"              
              
  - sensor:
      - name: "Energy Total"
        unique_id: "energy_total"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {% set raw = states('sensor.energy_relay_energy') %}
          {% set val = raw | float(default=None) %}
          {% set prev = this.state | float(0) %}

          {% if val is not none and val >= 0 %}
            {% set new = (val + 19360.7) %}
            {{ [new, prev] | max | round(1) }}
          {% else %}
            {{ prev }}
          {% endif %}
          
      - name: "Atmospheric Pressure mmHg"
        unique_id: pressure_mmhg_avg
        unit_of_measurement: "mmHg"
        device_class: pressure
        state_class: measurement
        state: >
          {% set s1 = states('sensor.yard_sensor_pressure') %}
          {% set s2 = states('sensor.podval_sensor_pressure') %}
          {% set offset = states('input_number.pressure_offset_mmhg') | float(0) %}

          {% set v1 = s1 | float(default=None) %}
          {% set v2 = s2 | float(default=None) %}

          {% if v1 == 0 %}{% set v1 = None %}{% endif %}
          {% if v2 == 0 %}{% set v2 = None %}{% endif %}

          {% if v1 != None and v2 != None %}
            {% set avg_hpa = (v1 + v2) / 2 %}
          {% elif v1 != None %}
            {% set avg_hpa = v1 %}
          {% elif v2 != None %}
            {% set avg_hpa = v2 %}
          {% else %}
            {% set avg_hpa = None %}
          {% endif %}

          {% if avg_hpa != None %}
            {{ (avg_hpa * 0.750062 + offset) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Livingroom Thermostat Target"
        unique_id: livingroom_thermostat_target
        unit_of_measurement: "°C"
        state: "{{ state_attr('climate.livingroom_thermostat', 'temperature') }}"      
        
      - name: "next_sunrise"
        state: >
          {{ as_timestamp(state_attr('sun.sun', 'next_rising')) | timestamp_custom('%H:%M') }}
        unique_id: "next_sunrise"
        
      - name: "next_sunset"
        state: >
          {{ as_timestamp(state_attr('sun.sun', 'next_setting')) | timestamp_custom('%H:%M') }}
        unique_id: "next_sunset"

mqtt:
  sensor:
    - name: "Water Consumption Cubic Meters"
      state_topic: "zigbee2mqtt_poe/impulse_counter"
      value_template: "{{ ((value_json.l3 | int * 10 / 1000) + 21.925) | round(2) }}"
      unit_of_measurement: "m³"
      device_class: "water"

utility_meter:
  daily_energy_main:
    source: sensor.energy_relay_energy
    cycle: daily
  daily_energy_boiler:
    source: sensor.boiler_relay_energy
    cycle: daily
  daily_water:
    source: sensor.water_consumption_cubic_meters
    cycle: daily

tts:
  - platform: google_translate

notify:
  - name: me
    platform: telegram
    chat_id: !secret telegram_chat_id

lovelace:
  resource_mode: yaml

  resources:
    - url: /local/community/button-card/button-card.js
      type: module
    - url: /local/community/webrtc-camera/webrtc-camera.js
      type: module

  dashboards:
    lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Overview
      icon: mdi:view-dashboard
      show_in_sidebar: true

sensor:

  - platform: time_date
    display_options:
      - 'time'
      - 'date'
      - 'date_time'

  - platform: statistics
    name: Yard temperature min 24h
    entity_id: sensor.yard_sensor_temperature
    state_characteristic: value_min
    sampling_size: 500
    max_age:
      hours: 24

  - platform: statistics
    name: Yard temperature max 24h
    entity_id: sensor.yard_sensor_temperature
    state_characteristic: value_max
    sampling_size: 500
    max_age:
      hours: 24

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
