- id: boiler_count_starts
  alias: Счётчик включений горелки
  trigger:
  - platform: state
    entity_id: binary_sensor.boiler_gorelka
    from: 'off'
    to: 'on'
    for: 00:00:05
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.boiler_starts_last_hour
    data:
      value: '{{ states(''input_number.boiler_starts_last_hour'') | int + 1 }}'
- id: boiler_reset_hourly
  alias: Сброс счётчика горелки каждый час
  trigger:
  - platform: time_pattern
    minutes: 0
    seconds: 0
  action:
  - service: input_number.set_value
    data:
      entity_id: input_number.boiler_starts_previous_hour
      value: "{{ states('input_number.boiler_starts_last_hour') | int }}"
  - service: input_number.set_value
    target:
      entity_id: input_number.boiler_starts_last_hour
    data:
      value: 0
  mode: single
- id: munute_tact
  alias: Ежеминутная автоматизация (отображение на панели и режим термостата)
  trigger:
    - platform: time_pattern
      minutes: /1

  action:
    ######################################
    # 🕒 Время на панели
    ######################################
    - service: mqtt.publish
      data:
        topic: hasp/plate1/command/p0b1.text
        payload: '{{ now().strftime("%H:%M") }}'

    ######################################
    # 🌅 Восход
    ######################################
    - service: mqtt.publish
      data:
        topic: hasp/plate1/command/p2b3.text
        payload: >
          {% if states("sensor.next_sunrise") not in ['unavailable', 'unknown'] %}
            Восход: {{ states("sensor.next_sunrise") }}
          {% else %}
            Восход: Н/Д
          {% endif %}

    ######################################
    # 🌇 Закат
    ######################################
    - service: mqtt.publish
      data:
        topic: hasp/plate1/command/p2b4.text
        payload: >
          {% if states("sensor.next_sunset") not in ['unavailable', 'unknown'] %}
            Закат: {{ states("sensor.next_sunset") }}
          {% else %}
            Закат: Н/Д
          {% endif %}

    ######################################
    # 🕹️ Управление режимом термостата по времени суток
    ######################################
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.climate_daily
              state: "on"
          sequence:
            - variables:
                hour: "{{ now().hour }}"
                desired_preset: >-
                  {% if hour >= 0 and hour < 7 %}
                    sleep
                  {% else %}
                    comfort
                  {% endif %}
                current_preset: "{{ state_attr('climate.livingroom_thermostat', 'preset_mode') }}"
            - condition: template
              value_template: "{{ desired_preset != current_preset }}"
            - service: climate.set_preset_mode
              target:
                entity_id: climate.livingroom_thermostat
              data:
                preset_mode: "{{ desired_preset }}"
            - service: notify.me
              data:
                message: >
                  🔄 Режим термостата автоматически изменён:
                  {{ desired_preset | replace('comfort','Комфорт') | replace('sleep','Сон') }}
                  🌡 Температура гостиной: {{ states('sensor.livingroom_sensor_temperature') | float(0) | round(1) }}°C
                  🕒 {{ now().strftime('%H:%M %d.%m.%Y') }}

    ######################################
    # 🌡️ Отображение текущего preset_mode на панели
    ######################################
    - variables:
        preset: "{{ state_attr('climate.livingroom_thermostat', 'preset_mode') | default('none') }}"
        ru_preset_map:
          none: "нет"
          comfort: "комфорт"
          away: "уехали"
          sleep: "сон"
        ru_preset: "{{ ru_preset_map[preset] if preset in ru_preset_map else 'Нет' }}"
        options: ["нет","комфорт","уехали","сон"]
        val: "{{ options.index(ru_preset) if ru_preset in options else 0 }}"
    - service: mqtt.publish
      data:
        topic: hasp/plate1/command/p3b8.val
        payload: "{{ val }}"
        
- id: panel_page
  alias: Отображение страницы на панели
