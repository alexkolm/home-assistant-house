- id: button_door_open
  alias: Домофон — открыть с кнопки (Zigbee)
  mode: single

  trigger:
    - platform: mqtt
      topic: "zigbee2mqtt_poe/button_door/action"
      payload: "single"

  condition: []

  action:
    - parallel:

        # Открытие замка
        - sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.domofon_door_rest

        # Озвучка
        - sequence:
            - service: media_player.play_media
              target:
                entity_id: !secret yandex_station_livingroom
              data:
                media_content_id: Кнопка нажата
                media_content_type: text
                extra:
                  volume_level: 0.7
              continue_on_error: true

- id: boiler_temp_limit
  alias: Ограничение температуры котла
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: climate.boiler_kotel
      attribute: temperature
      above: 70

  action:
  # Устанавливаем обратно 70
    - service: climate.set_temperature
      target:
        entity_id: climate.boiler_kotel
      data:
        temperature: 70

  # Запись в лог HA
    - service: logbook.log
      data:
        name: "Котёл"
        message: "Автоматизация ограничила температуру до 70°C"
        entity_id: climate.boiler_kotel

    # Оповещение в Telegram
    - service: notify.me
      data:
        message: "Ограничиваем максимальную температуру котла автоматизацией"

- id: bedroom_presence_detected
  alias: Спальня - обнаружено присутствие
  trigger:
    - platform: state
      entity_id: binary_sensor.human_sensor_bedroom_presence
      to: "on"

  action:
    # Включаем виртуальное присутствие
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_presence_state

    # Сбрасываем таймер выключения
    - service: timer.cancel
      target:
        entity_id: timer.bedroom_presence_off_delay

  mode: restart


- id: bedroom_presence_lost
  alias: Спальня - датчик потерял присутствие
  trigger:
    - platform: state
      entity_id: binary_sensor.human_sensor_bedroom_presence
      to: "off"

  action:
    # Запускаем таймер отсутствия
    - service: timer.start
      target:
        entity_id: timer.bedroom_presence_off_delay

  mode: restart


- id: bedroom_presence_timeout
  alias: Спальня - виртуальное присутствие выключено по таймеру
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.bedroom_presence_off_delay

  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_presence_state

  mode: single

- id: away_script
  alias: Скрипт "Уезжаем надолго"
  trigger:
    - platform: event
      event_type: telegram_command
      event_data:
        command: /away
  condition: []
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.notify_away_home
  mode: single

- id: faraway
  alias: Включение режима, когда уезжаем из дома надолго
  trigger:
    - platform: state
      entity_id: input_boolean.notify_away_home
      to: "on"

  condition: []

  action:
    # сообщение на колонку
    - service: media_player.play_media
      target:
        entity_id: !secret yandex_station_livingroom
      data:
        media_content_id: Уезжаем надолго
        media_content_type: text
        extra:
          volume_level: 0.7

    # оповещение в телеграм
    - service: notify.me
      data:
        message: "Скрипт 'Уехали надолго' запущен"

    # отключаем бойлер
    - service: switch.turn_off
      target:
        entity_id: switch.boiler_plug
        
# перезапуск питания теплого пола и полотенцесушителя
    - service: switch.turn_off
      target:
        entity_id:
          - switch.main_floor_relay
          - switch.towel_dryer_plug

    - delay: "00:00:05"

    - service: switch.turn_on
      target:
        entity_id:
          - switch.main_floor_relay
          - switch.towel_dryer_plug

    # ⬇️ Работа с термостатом ТОЛЬКО если он в режиме heat
    - choose:
        - conditions:
            - condition: state
              entity_id: climate.livingroom_thermostat
              state: "heat"
          sequence:
            # отключаем режим день/ночь
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.climate_daily

            # ставим away
            - service: climate.set_preset_mode
              target:
                entity_id: climate.livingroom_thermostat
              data:
                preset_mode: "away"

  mode: single
  
- id: notify_offline_restore_after_48h
  alias: Restore notify_offline after 48h
  mode: restart
  trigger:
    - platform: state
      entity_id: input_boolean.notify_offline
      to: "off"

  action:
    - delay: "48:00:00"

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.notify_offline
        
- id: boiler_control_by_thermostat
  alias: 'Управление газовым котлом по термостату'
  trigger:
    # реагируем на смену состояния и действия термостата
    - platform: state
      entity_id: climate.livingroom_thermostat
      attribute: hvac_action
    - platform: state
      entity_id: climate.livingroom_thermostat
      to:
        - 'off'
        - 'heat'

  action:
    - delay: 2  # 🕐 короткая задержка, чтобы hvac_action успел обновиться

    - choose:

        # 🟢 Если термостат в режиме "heat" и реально греет
        - conditions:
            - condition: state
              entity_id: climate.livingroom_thermostat
              state: 'heat'
            - condition: state
              entity_id: climate.livingroom_thermostat
              attribute: hvac_action
              state: 'heating'
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.boiler_kotel
              data:
                hvac_mode: 'heat'

        # 🟡 Если термостат включён, но не греет (idle)
        - conditions:
            - condition: state
              entity_id: climate.livingroom_thermostat
              state: 'heat'
            - condition: state
              entity_id: climate.livingroom_thermostat
              attribute: hvac_action
              state: 'idle'
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.boiler_kotel
              data:
                hvac_mode: 'off'

        # 🔴 Если термостат выключен
        - conditions:
            - condition: state
              entity_id: climate.livingroom_thermostat
              state: 'off'
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.boiler_kotel
              data:
                hvac_mode: 'off'

  mode: restart

- id: bathroom_presence_fan_control
  alias: "Управление вытяжкой по датчику присутствия"
  trigger:
    - platform: state
      entity_id: binary_sensor.human_sensor_bathroom_presence
  action:
    - choose:
        # Ветка 1: Если датчик показал присутствие (on) - включаем вентилятор
        - conditions:
            - condition: state
              entity_id: binary_sensor.human_sensor_bathroom_presence
              state: 'on'
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.airvent_relay
        # Ветка 2: Если датчик показал отсутствие (off) - выключаем вентилятор
        - conditions:
            - condition: state
              entity_id: binary_sensor.human_sensor_bathroom_presence
              state: 'off'
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.airvent_relay
  mode: single
  
- id: gas_boiler_watchdog
  alias: Watchdog для газового котла
  description: Перезапуск контроллера котла при потере пинга и уведомление
  trigger:
    - platform: state
      entity_id: binary_sensor.gas_ping
      to: 'off'
      for: '00:05:00'
  condition: []
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.gas_usb
    - delay:
        seconds: 5
    - service: switch.turn_on
      target:
        entity_id: switch.gas_usb
    - service: notify.me
      data:
        message: "Контроллер газового котла перезапущен (SmartTherm, 192.168.0.212)"
  mode: single

- id: hasp_thermostat_temp_adjust
  alias: "Регулировка температуры термостата с панели openHASP"
  trigger:
    - platform: mqtt
      topic: hasp/plate1/state/p3b11 # кнопка "-"
    - platform: mqtt
      topic: hasp/plate1/state/p3b12 # кнопка "+"
  action:
    - variables:
        # Текущее состояние и параметры термостата
        cur_temp: "{{ state_attr('climate.livingroom_thermostat', 'temperature') | float(0) }}"
        min_temp: "{{ state_attr('climate.livingroom_thermostat', 'min_temp') | float(14) }}"
        max_temp: "{{ state_attr('climate.livingroom_thermostat', 'max_temp') | float(28) }}"
        step: 0.1
        # Определяем направление (нажата + или -)
        direction: >
          {% if trigger.topic.endswith('p3b11') %}-{% elif trigger.topic.endswith('p3b12') %}+{% endif %}
        # Новое значение с учётом границ
        new_temp: >
          {% if direction == '-' %}
            {{ [cur_temp - step, min_temp] | max }}
          {% elif direction == '+' %}
            {{ [cur_temp + step, max_temp] | min }}
          {% else %}
            {{ cur_temp }}
          {% endif %}
    - service: climate.set_temperature
      target:
        entity_id: climate.livingroom_thermostat
      data:
        temperature: "{{ new_temp | round(1) }}"
    - condition: state
      entity_id: input_boolean.climate_daily
      state: 'on'
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.climate_daily
    - delay: "00:00:0.4" # задержка 400 мс для защиты от дребезга

- id: boiler_sync_by_timer
  alias: 'Синхронизация котла по таймеру'
  description: 'Периодическая проверка и синхронизация состояния котла с термостатом'
  trigger:
    - platform: time_pattern
      minutes: '/5'
  action:
    # Определяем необходимый режим котла на основе состояния термостата
    - variables:
        thermostat_mode: "{{ states('climate.livingroom_thermostat') }}"
        thermostat_action: "{{ state_attr('climate.livingroom_thermostat', 'hvac_action') }}"
        required_boiler_mode: >
          {% if thermostat_mode == 'heat' and thermostat_action == 'heating' %}
            heat
          {% else %}
            off
          {% endif %}
        current_boiler_mode: "{{ states('climate.boiler_kotel') }}"

    # Применяем требуемый режим, если он отличается от текущего
    - choose:
        - conditions: "{{ current_boiler_mode != required_boiler_mode and required_boiler_mode == 'heat' }}"
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.boiler_kotel
              data:
                hvac_mode: 'heat'
            - service: notify.me
              data:
                message: |
                  🔥 Котел ВКЛЮЧЕН по таймеру
                  Термостат: {{ thermostat_mode }} ({{ thermostat_action }})
                  Котел был: {{ current_boiler_mode }}

        - conditions: "{{ current_boiler_mode != required_boiler_mode and required_boiler_mode == 'off' }}"
          sequence:
            - service: climate.set_hvac_mode
              target:
                entity_id: climate.boiler_kotel
              data:
                hvac_mode: 'off'
            - service: notify.me
              data:
                message: |
                  ⏹️ Котел ВЫКЛЮЧЕН по таймеру
                  Термостат: {{ thermostat_mode }} ({{ thermostat_action }})
                  Котел был: {{ current_boiler_mode }}

        - conditions: "{{ current_boiler_mode == required_boiler_mode }}"
          sequence:
            # Состояния совпадают - ничего не делаем
            - service: system_log.write
              data:
                logger: homeassistant.automation.boiler_sync
                level: info
                message: "Состояния совпадают, изменений не требуется"

  mode: single
- id: house_devices_off
  alias: "Контроль освещения — выключить после 5 часов работы"
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition: []
  action:
    # Для switch.livingroom_relay
    - if:
        - condition: state
          entity_id: switch.livingroom_relay
          state: "on"
        - condition: template
          value_template: >
            {{ (as_timestamp(now()) - as_timestamp(states.switch.livingroom_relay.last_changed)) > 5 * 3600 }}
      then:
        - service: switch.turn_off
          target:
            entity_id: switch.livingroom_relay
        - service: notify.me
          data:
            message: |
              ⚠️ Реле в гостиной работало более 5 часов.
              Автоматически отключено.

    # Для light.torsher_lamp
    - if:
        - condition: state
          entity_id: light.torsher_lamp
          state: "on"
        - condition: template
          value_template: >
            {{ (as_timestamp(now()) - as_timestamp(states.light.torsher_lamp.last_changed)) > 5 * 3600 }}
      then:
        - service: light.turn_off
          target:
            entity_id: light.torsher_lamp
        - service: notify.me
          data:
            message: |
              ⚠️ Торшер горел более 5 часов.
              Автоматически отключен.
  mode: parallel
  max: 3
- id: panel_cam_snapshot
