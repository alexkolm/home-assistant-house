- id: notify_boiler_error
  alias: Уведомление об ошибке котла
  trigger:
  - platform: state
    entity_id: sensor.boiler_oshibki
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != ''нет'' }}'
  action:
  - service: notify.me
    data:
      message: '⚠️ Обнаружена ошибка котла!

        Сообщение: {{ states(''sensor.boiler_oshibki'') }}

        '
  mode: single
- id: report_indoor_temp
  alias: Report indoor temp to SmarTherm controller
  triggers:
  - trigger: time_pattern
    seconds: /10
  conditions:
  - condition: template
    value_template: '{{ states(''source_entity'') != ''unavailable'' }}'
  actions:
  - if:
    - condition: template
      value_template: '{{ (states(source_entity)|float(0) - states(target_entity)|float(0))
        | abs | round(2) >= 0.05 }}'
    then:
    - action: number.set_value
      metadata: {}
      data:
        value: '{{ states(source_entity)|float(0)|round(2) }}'
      target:
        entity_id: '{{ target_entity }}'
  variables:
    source_entity: sensor.livingroom_sensor_temperature
    target_entity: number.boiler_t_indoor
  mode: single
- id: report_outdoor_temp
  alias: Report outdoor temp to SmarTherm controller
  triggers:
  - trigger: time_pattern
    seconds: /30

  variables:
    yard_temp: "{{ states('sensor.yard_sensor_temperature') }}"
    weather_temp: "{{ state_attr('weather.forecast_house_lenina', 'temperature') }}"
    use_weather: "{{ yard_temp in ['unavailable', 'unknown', None] }}"
    source_value: >-
      {% if not use_weather %}
        {{ yard_temp | float(0) }}
      {% else %}
        {{ weather_temp | float(0) }}
      {% endif %}
    target_entity: number.boiler_t_outdoor

  conditions:
  - condition: template
    value_template: "{{ source_value != 0 }}"

  actions:
  - choose:
      # 1️⃣ если локальный сенсор недоступен — шлём уведомление и используем погоду
      - conditions:
          - condition: template
            value_template: "{{ use_weather }}"
        sequence:
          - service: notify.me
            data:
              message: |
                ⚠️ Уличный сенсор температуры неисправен или временно недоступен.
                Берем данные с метеосайта.
          - if:
              - condition: template
                value_template: >
                  {{ (source_value - states(target_entity)|float(0)) | abs | round(2) >= 0.05 }}
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ target_entity }}"
                data:
                  value: "{{ source_value | round(2) }}"
      # 2️⃣ если сенсор работает нормально
      - conditions:
          - condition: template
            value_template: "{{ not use_weather }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ (source_value - states(target_entity)|float(0)) | abs | round(2) >= 0.05 }}
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ target_entity }}"
                data:
                  value: "{{ source_value | round(2) }}"
  mode: single
- id: soil_moisture_check
  alias: Влага почвы — напоминание при понижении
  trigger:
  - platform: numeric_state
    entity_id: sensor.plant_sensor_soil_moisture
    below: 100
    for: 00:00:10
  - platform: time
    at: '10:00:00'
  condition:
  - condition: numeric_state
    entity_id: sensor.plant_sensor_soil_moisture
    below: 100
  action:
  - service: notify.me
    data:
      message: "Проверьте влажность почвы у цветов в доме\n \U0001F331 Влажность ниже
        100%.\n \n"
- id: gate_open
  alias: Домофон — калитка открыта
  mode: single

  trigger:
    - platform: event
      event_type: call_service

  condition:
    - condition: template
      value_template: >
        {{ trigger.event.data.domain == 'rest_command'
           and trigger.event.data.service == 'domofon_open_door' }}

  action:
    - parallel:

        # Озвучка
        - sequence:
            - service: media_player.play_media
              target:
                entity_id: !secret yandex_station_livingroom
              data:
                media_content_id: Замок калитки открыт
                media_content_type: text
                extra:
                  volume_level: 0.7

        # Фото + видео
        - sequence:
            - service: camera.snapshot
              data:
                entity_id: camera.domofon_audio
                filename: /config/www/domofon.jpg

            - service: shell_command.record_domofon_video

        # Завершить вызов (через JSON API — стабильный вариант)
        - sequence:
            - delay: "00:00:02"

            - service: rest_command.domofon_reject_call
              continue_on_error: true

        # Отправка фото и видео
        - sequence:
            - delay: "00:00:07"
            - service: notify.me
              data:
                message: ""
                data:
                  photo:
                    - file: /config/www/domofon.jpg
                      caption: "Калитка открыта. Фото 📸"

            - delay: "00:00:02"
            - service: notify.me
              data:
                message: ""
                data:
                  video:
                    - file: /config/www/domofon.mp4
                      caption: "... и видео 🎥"

            - service: shell_command.delete_domofon_video

- id: boiler_off
  alias: Отключение отопления
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.livingroom_sensor_temperature
    above: 18
  conditions:
  - condition: state
    entity_id: input_boolean.notify_boiler
    state: 'on'
  - condition: state
    entity_id: switch.boiler_relay
    state: 'on'
  actions:
  - data:
      entity_id: switch.boiler_relay
    action: switch.turn_off
  - data:
      message: Температура повысилась, электрокотел отключен
    action: notify.me
  mode: single
- id: boiler_on
  alias: Включение отопления
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.livingroom_sensor_temperature
    below: 16
  conditions:
  - condition: state
    entity_id: input_boolean.notify_boiler
    state: 'on'
  - condition: state
    entity_id: switch.boiler_relay
    state: 'off'
  actions:
  - data:
      entity_id: switch.boiler_relay
    action: switch.turn_on
  - data:
      message: Температура снизилась, запущен электрокотел
    action: notify.me
  mode: single
- id: pump_off
  alias: Выключение насоса после 15 минут бездействия электрокотла
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.boiler_relay_power
    below: 100
    for:
      hours: 0
      minutes: 15
      seconds: 0
  condition:
  - condition: state
    entity_id: switch.pump_plug
    state: 'on'
  action:
  - service: switch.turn_off
    data:
      entity_id: switch.pump_plug
  - service: notify.me
    data:
      message: Насос выключен после 15 минут бездействия электрокотла
- id: pump_on
  alias: Включение насоса при запуске электрокотла
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.boiler_relay_power
    above: 100
  condition:
  - condition: state
    entity_id: switch.pump_plug
    state: 'off'
  action:
  - service: switch.turn_on
    data:
      entity_id: switch.pump_plug
  - service: notify.me
    data:
      message: Насос запущен после включения электрокотла
- id: total_info
  alias: Уведомление о потреблении ежесуточно
  trigger:
  - platform: time
    at: 00:01:00
  action:
  - service: notify.me
    data:
      message: "Потреблено за сутки в доме:  \n⚡ Энергия: {{ state_attr('sensor.daily_energy_main',
        'last_period') | float }} кВт⋅ч  \n\U0001F4A7 Вода: {{ state_attr('sensor.daily_water',
        'last_period') | float }} м³\n"
- id: devices_offline_notification
  alias: Оповещение о потере связи с устройствами
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.domofon_ping
        - binary_sensor.videoreg_ping
        - binary_sensor.192_168_0_50
        - binary_sensor.openhasp_panel
        - binary_sensor.gas_ping
      to: 'off'
      for: "00:02:00"

  condition:
    - condition: state
      entity_id: input_boolean.notify_offline
      state: 'on'

  action:
    - service: notify.me
      data:
        message: >
          {% set devices = {
            'binary_sensor.domofon_ping': ['Домофон', '192.168.0.200'],
            'binary_sensor.videoreg_ping': ['Видеосервер', '192.168.0.150'],
            'binary_sensor.192_168_0_50': ['Zigbee-роутер', '192.168.0.50'],
            'binary_sensor.openhasp_panel': ['OpenHASP панель', '192.168.0.120'],
            'binary_sensor.gas_ping': ['SmartTherm', '192.168.0.212']
          } %}
          ША: {{ devices[trigger.entity_id][0] }} ({{ devices[trigger.entity_id][1] }}) не в сети более 2 минут
- id: leaving_home
  alias: Хозяева покинули дом
  trigger:
    platform: state
    entity_id: group.family
    to: not_home
  action:
  - service: notify.me
    data:
      message: 'ША: Все ушли, уведомления об открытии дверей включены'
  - service: switch.turn_on
    data:
      entity_id: switch.ipcam_plug
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.notify_door
- id: entering_home
  alias: Хозяин вернулся в дом
  trigger:
    platform: state
    entity_id: group.family
    from: not_home
    to: home
  action:
  - service: notify.me
    data:
      message: 'ША: Кто-то из хозяев пришёл, уведомления об открытии дверей отключены'
  - service: switch.turn_off
    data:
      entity_id: switch.ipcam_plug
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.notify_door
- id: door_open
  alias: Оповещение об открытии дверей дома
  mode: parallel
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.front_door_contact
    - binary_sensor.back_door_contact
    from: 'on'
    to: 'off'
  condition:
  - condition: state
    entity_id: input_boolean.notify_door
    state: 'on'
  variables:
    door_name: "{% if trigger.entity_id == 'binary_sensor.front_door_contact' %}\n
      \ парадной двери \U0001F513\n{% elif trigger.entity_id == 'binary_sensor.back_door_contact'
      %}\n  задней двери \U0001F513\n{% else %}\n  неизвестной двери\n{% endif %}"
  action:
  - service: notify.me
    data:
      message: 'ША: Открытие {{ door_name }}'
- id: sun_set
  alias: Закат (использую для проверки, включен ли сервер)
  trigger:
    - platform: sun
      event: sunset
  action:
    - service: notify.me
      data:
        message: |
          ША: Солнце село 🌅
          temp out {{ states('sensor.yard_sensor_temperature') | float(0) | round(1) }}°C / in {{ states('sensor.bedroom_sensor_temperature') | float(0) | round(1) }}°C
  mode: single
- id: leak_water_protection
  alias: Протечка — перекрытие воды и оповещение
  mode: single

  trigger:
    - platform: state
      entity_id:
        - binary_sensor.leak_kitchen_water_leak
        - binary_sensor.leak_toilet_water_leak
      to: 'on'

  variables:
    leak_place: >
      {% if trigger.entity_id == 'binary_sensor.leak_kitchen_water_leak' %}
        кухне
      {% elif trigger.entity_id == 'binary_sensor.leak_toilet_water_leak' %}
        туалете
      {% else %}
        неизвестном месте
      {% endif %}

  action:
    # 🚰 Перекрыть воду
    - service: switch.turn_on
      target:
        entity_id: switch.water_isolation_valve

    # 📩 Уведомление в Telegram
    - service: notify.me
      data:
        message: "🚨 ПРОТЕЧКА в {{ leak_place }}! Вода перекрыта."

    # 🔊 Озвучка на колонке
    - service: media_player.play_media
      target:
        entity_id: !secret yandex_station_livingroom
      data:
        media_content_id: "Обнаружена протечка в {{ leak_place }}. Вода перекрыта."
        media_content_type: text
        extra:
          volume_level: 0.9  
- id: domofon_ringing
  alias: Вызов на домофоне
  trigger: 
    - platform: state 
      entity_id: sensor.domofon_call_state 
      to: ringing
  condition: []
  action:
    - variables:
        prev_page: "{{ states('number.plate1_page_number') | int(1) }}"
    - service: notify.me
      data:
        message: "📞 Вызов на домофоне"
    - service: media_player.play_media
      target:
        entity_id: !secret yandex_station_livingroom
      data:
        media_content_id: "Вызов на домофоне"
        media_content_type: text
        extra:
          volume_level: 0.7
    - service: number.set_value
      target:
        entity_id: number.plate1_page_number
      data:
        value: 4
    - service: light.turn_on
      target:
        entity_id: light.plate1_backlight
      data:
        brightness_pct: 100
    - delay: "00:01:00"
    - service: number.set_value
      target:
        entity_id: number.plate1_page_number
      data:
        value: "{{ prev_page }}"
  mode: single

