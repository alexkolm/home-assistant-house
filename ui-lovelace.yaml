        name: ZigBee роутер (192.168.0.50)
      title: Устройства в сети

    - type: entities
      entities:
      - entity: device_tracker.alex
        name: Телефон хозяина
      - entity: device_tracker.tanya
        name: Телефон хозяйки
      - entity: group.family  
        name: Присутствие хозяев
